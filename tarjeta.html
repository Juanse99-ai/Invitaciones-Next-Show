<meta property="og:description" content="Te queremos en una noche que va a quedar en la memoria de Sabanalarga. 13 de junio · 7:00 PM · La Zona Deportiva.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* === FONT === */
@font-face {
  font-family: 'Allison';
  font-style: normal;
  font-weight: 400;
  src: url('assets/allison-latin-400-normal.woff2') format('woff2');
  font-display: swap;
}

/* === RESET === */
html, body { margin: 0; padding: 0; }
html {
  background: #0d0a1f;
  scroll-behavior: smooth;
  overflow-x: hidden;
}
body {
  background: #0d0a1f;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: #fff;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
* { box-sizing: border-box; }

/* === TOKENS === */
:root {
  --ns-bg-base: #0d0a1f;
  --ns-cyan: #00d4ff;
  --ns-violet: #8b5cf6;
  --ns-magenta: #d946ef;
  --ns-pink: #ff3d8a;
  --ns-muted: #c4bfd6;
  --ns-dim: #7c7a90;
  --ns-whatsapp: #25D366;
  --ns-grad: linear-gradient(90deg, #00d4ff 0%, #2196f3 24%, #8b5cf6 56%, #d946ef 82%, #e91e63 100%);
}

/* === KEYFRAMES === */
@keyframes ns-billow-cyan {
  0% { transform: translate(-8%, 4%) scale(1) rotate(0deg); }
  25% { transform: translate(12%, -6%) scale(1.25) rotate(6deg); }
  50% { transform: translate(18%, 10%) scale(1.15) rotate(-4deg); }
  75% { transform: translate(-4%, -8%) scale(1.32) rotate(8deg); }
  100% { transform: translate(-8%, 4%) scale(1) rotate(0deg); }
}
@keyframes ns-billow-magenta {
  0% { transform: translate(8%, -4%) scale(1) rotate(0deg); }
  25% { transform: translate(-14%, 8%) scale(1.28) rotate(-6deg); }
  50% { transform: translate(-6%, -10%) scale(1.18) rotate(4deg); }
  75% { transform: translate(12%, 6%) scale(1.3) rotate(-8deg); }
  100% { transform: translate(8%, -4%) scale(1) rotate(0deg); }
}
@keyframes ns-billow-violet {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); }
  33% { transform: translate(-12%, 6%) scale(1.3) rotate(10deg); }
  66% { transform: translate(10%, -8%) scale(1.35) rotate(-12deg); }
  100% { transform: translate(0, 0) scale(1) rotate(0deg); }
}
@keyframes ns-wisps-drift {
  0% { transform: translate(0, 0); }
  50% { transform: translate(-16%, -6%); }
  100% { transform: translate(-32%, 0); }
}
@keyframes ns-glow-pulse {
  0%, 100% { filter: drop-shadow(0 0 28px rgba(0,212,255,0.55)) drop-shadow(0 0 64px rgba(217,70,239,0.35)); }
  50% { filter: drop-shadow(0 0 42px rgba(0,212,255,0.85)) drop-shadow(0 0 96px rgba(217,70,239,0.55)); }
}
@keyframes ns-grad-shift {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
@keyframes ns-fade-up {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes ns-spark-travel {
  0% { left: -10%; opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { left: 110%; opacity: 0; }
}
@keyframes ns-soft-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes ns-twinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}
@keyframes ns-pulse-ring {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* === CARD === */
.web-card {
  min-height: 100vh;
  background: var(--ns-bg-base);
  color: #fff;
  position: relative;
  overflow: hidden;
}

/* === BACKGROUND === */
/* Un solo "stage" fixed: todas las capas del fondo viven aquí dentro como
   position:absolute, así se mueven JUNTAS y nunca se desincronizan durante el
   scroll en móvil (antes cada capa era fixed por separado y se desfasaban un
   instante: se veía el video sin la capa de humo/tinte encima). */
.web-card .bg-stage {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
  transform: translateZ(0);
  will-change: transform;
  -webkit-backface-visibility: hidden; backface-visibility: hidden;
}
.web-card .bg-stage .bg-base,
.web-card .bg-stage .bg-smoke-cyan,
.web-card .bg-stage .bg-smoke-violet,
.web-card .bg-stage .bg-smoke-magenta,
.web-card .bg-stage .bg-smoke-wisps,
.web-card .bg-stage .bg-video,
.web-card .bg-stage .bg-tint,
.web-card .bg-stage .bg-vignette,
.web-card .bg-stage .ns-twinkle {
  position: absolute;
}
.web-card .bg-base {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 110% 70% at 50% 110%, #1a0820 0%, transparent 60%),
    radial-gradient(ellipse 110% 70% at 50% -10%, #261140 0%, transparent 55%),
    linear-gradient(165deg, #0d0a1f 0%, #120a26 50%, #15071f 100%);
}
/* Smoke layers — hidden by default, only shown when video fails */
.web-card .bg-smoke-cyan,
.web-card .bg-smoke-violet,
.web-card .bg-smoke-magenta,
.web-card .bg-smoke-wisps {
  opacity: 0;
  transition: opacity 0.8s ease;
}
.web-card.bg-smoke .bg-smoke-cyan,
.web-card.bg-smoke .bg-smoke-violet,
.web-card.bg-smoke .bg-smoke-magenta,
.web-card.bg-smoke .bg-smoke-wisps { opacity: 1; }

.web-card .bg-smoke-cyan {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 60% 50% at 18% 30%, rgba(0,212,255,0.85) 0%, rgba(0,170,255,0.5) 28%, rgba(0,140,255,0.2) 55%, transparent 75%),
    radial-gradient(ellipse 50% 40% at 28% 75%, rgba(77,219,245,0.6) 0%, rgba(0,212,255,0.25) 35%, transparent 65%);
  filter: blur(28px);
  mix-blend-mode: screen;
  animation: ns-billow-cyan 16s ease-in-out infinite;
  will-change: transform;
}
.web-card .bg-smoke-violet {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 55% 50% at 50% 45%, rgba(139,92,246,0.7) 0%, rgba(124,58,237,0.35) 35%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 60% 80%, rgba(168,85,247,0.5) 0%, transparent 60%);
  filter: blur(32px);
  mix-blend-mode: screen;
  animation: ns-billow-violet 22s ease-in-out infinite;
  will-change: transform;
}
.web-card .bg-smoke-magenta {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 60% 50% at 85% 55%, rgba(217,70,239,0.85) 0%, rgba(255,61,138,0.5) 28%, rgba(217,70,239,0.2) 55%, transparent 75%),
    radial-gradient(ellipse 50% 40% at 75% 22%, rgba(236,72,153,0.6) 0%, transparent 60%);
  filter: blur(28px);
  mix-blend-mode: screen;
  animation: ns-billow-magenta 18s ease-in-out infinite;
  will-change: transform;
}
.web-card .bg-smoke-wisps {
  position: fixed; inset: -10% -25%; z-index: 1;
  background:
    radial-gradient(ellipse 25% 7% at 30% 45%, rgba(255,255,255,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 22% 6% at 70% 60%, rgba(0,212,255,0.3) 0%, transparent 60%),
    radial-gradient(ellipse 24% 6% at 55% 25%, rgba(217,70,239,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 20% 5% at 45% 80%, rgba(139,92,246,0.3) 0%, transparent 60%);
  filter: blur(16px);
  mix-blend-mode: screen;
  animation: ns-wisps-drift 24s linear infinite;
  will-change: transform;
}
/* Video — fades in when playing */
.web-card .bg-video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.web-card.bg-video .bg-video,
.web-card.bg-loading .bg-video { opacity: 1; }
.web-card.bg-smoke .bg-video { opacity: 0; }
.web-card .bg-tint {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(180deg,
    rgba(13,10,31,0.32) 0%,
    rgba(13,10,31,0.1) 35%,
    rgba(13,10,31,0.1) 65%,
    rgba(13,10,31,0.42) 100%);
}
.web-card .bg-vignette {
  position: fixed; inset: 0; z-index: 4; pointer-events: none;
  background: radial-gradient(ellipse 100% 95% at 50% 50%, transparent 60%, rgba(0,0,0,0.4) 100%);
}
.ns-twinkle {
  position: fixed;
  width: 3px; height: 3px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 6px 1px #fff;
  animation: ns-twinkle 3s ease-in-out infinite;
  pointer-events: none;
  z-index: 3;
}

/* === LAYOUT === */
.web-card .wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 28px;
  position: relative;
  z-index: 10;
}
.web-card section { padding: 70px 0; position: relative; z-index: 10; }
.web-card .hero { padding: 70px 0 60px; min-height: 100vh; display: flex; align-items: center; }
.web-card .hero .wrap { text-align: center; width: 100%; }

/* === ANIMS === */
.web-card .anim-up { opacity: 0; animation: ns-fade-up 0.8s ease forwards; }
.web-card .anim-up.d-1 { animation-delay: 0.15s; }
.web-card .anim-up.d-2 { animation-delay: 0.30s; }
.web-card .anim-up.d-3 { animation-delay: 0.50s; }
.web-card .anim-up.d-4 { animation-delay: 0.70s; }
.web-card .anim-up.d-5 { animation-delay: 0.95s; }
.web-card .anim-up.d-6 { animation-delay: 1.15s; }
.web-card .anim-up.d-7 { animation-delay: 1.35s; }
.web-card .anim-up.d-8 { animation-delay: 1.55s; }
/* Sections visible from the start — animation on scroll is enhancement */
.web-card .sec-reveal {
  opacity: 1; transform: translateY(0);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

/* === HERO === */
.web-card .fecha-tag {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 28px 12px 22px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(0,212,255,0.45);
  border-radius: 60px;
  font-weight: 800; font-size: 15px; letter-spacing: 0.34em;
  color: var(--ns-cyan); text-transform: uppercase;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 0 1px rgba(0,212,255,0.08), 0 0 32px rgba(0,212,255,0.25);
  margin-bottom: 32px;
}
.web-card .fecha-tag .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ns-cyan);
  box-shadow: 0 0 12px var(--ns-cyan), 0 0 24px var(--ns-cyan);
  animation: ns-glow-pulse 2.4s ease-in-out infinite;
}
.web-card .logo-oficial {
  display: inline-block;
  padding: 18px 42px;
  background: #000;
  border-radius: 10px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 24px 70px rgba(0,212,255,0.32),
    0 24px 70px rgba(217,70,239,0.32);
  margin-bottom: 46px;
}
.web-card .logo-text {
  font-family: 'Inter', sans-serif;
  font-weight: 900;
  font-size: clamp(54px, 13vw, 92px);
  line-height: 1;
  letter-spacing: -0.045em;
  text-transform: uppercase;
  white-space: nowrap;
}
.web-card .logo-text.small { font-size: 32px; }
.web-card .logo-text .next { color: #fff; }
.web-card .logo-text .show {
  background: var(--ns-grad); background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: ns-grad-shift 6s linear infinite;
}
@supports not (background-clip: text) {
  .web-card .logo-text .show { -webkit-text-fill-color: #d946ef; color: #d946ef; }
}
.web-card .invita-label {
  font-weight: 700; font-size: 13px; letter-spacing: 0.42em;
  color: var(--ns-muted); text-transform: uppercase;
  margin-bottom: 8px;
}
.web-card .nombre {
  font-family: 'Allison', cursive;
  font-size: clamp(76px, 18vw, 150px);
  line-height: 1.0;
  color: #fff; font-weight: 400;
  padding: 0 12px;
  margin: 0 0 8px;
  word-wrap: break-word;
  text-shadow:
    0 0 30px rgba(0,212,255,0.55),
    0 0 60px rgba(217,70,239,0.4),
    0 4px 20px rgba(0,0,0,0.6);
  animation: ns-fade-up 0.8s ease 0.70s forwards, ns-glow-pulse 4s ease-in-out 2.5s infinite;
}
.web-card .nombre.l2 { font-size: clamp(68px, 16vw, 130px); }
.web-card .nombre.l3 { font-size: clamp(58px, 14vw, 110px); }
.web-card .nombre.l4 { font-size: clamp(50px, 12vw, 92px); }
.web-card .nombre.l5 { font-size: clamp(42px, 10vw, 76px); }

/* Generic mode — no personalized greeting */
.web-card .nombre-generic {
  font-family: 'Allison', cursive;
  font-size: clamp(64px, 14vw, 110px);
  line-height: 1.0;
  color: #fff;
  font-weight: 400;
  margin: 0 0 8px;
  padding: 0 12px;
  text-shadow:
    0 0 30px rgba(0,212,255,0.55),
    0 0 60px rgba(217,70,239,0.4),
    0 4px 20px rgba(0,0,0,0.6);
  animation: ns-fade-up 0.8s ease 0.70s forwards, ns-glow-pulse 4s ease-in-out 2.5s infinite;
}

.web-card .divider {
  position: relative;
  width: 200px; height: 3px;
  margin: 14px auto 22px;
  border-radius: 3px;
  background: var(--ns-grad);
  box-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 30px rgba(217,70,239,0.35);
  overflow: visible;
}
.web-card .divider::after {
  content: ''; position: absolute; top: -2px; width: 50px; height: 7px;
  border-radius: 7px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  filter: blur(2px);
  animation: ns-spark-travel 3.4s linear 2s infinite;
}
.web-card .mensaje {
  font-size: clamp(16px, 4vw, 19px);
  color: var(--ns-muted);
  line-height: 1.5;
  max-width: 520px;
  margin: 0 auto 38px;
}
.web-card .mensaje strong { color: #fff; font-weight: 700; }

/* === COUNTDOWN === */
.web-card .countdown {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 480px; width: 100%;
  margin: 0 auto 36px;
}
.web-card .cd-item {
  position: relative;
  background: linear-gradient(180deg, rgba(13,10,31,0.92), rgba(13,10,31,0.82));
  border: 1px solid rgba(139,92,246,0.4);
  border-radius: 14px;
  padding: 16px 6px;
  text-align: center;
  backdrop-filter: blur(12px);
}
.web-card .cd-num {
  font-weight: 900;
  font-size: clamp(26px, 6.5vw, 38px);
  color: #00d4ff;
  background: var(--ns-grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin-bottom: 6px;
}
@supports not (background-clip: text) {
  .web-card .cd-num { -webkit-text-fill-color: #00d4ff; color: #00d4ff; }
}
.web-card .cd-label {
  font-size: 10px; color: var(--ns-muted);
  text-transform: uppercase; letter-spacing: 0.22em;
  font-weight: 700;
}

/* === CTA BUTTONS === */
.web-card .cta-hero, .web-card .cta-wa-big {
  display: inline-flex; align-items: center; justify-content: center; gap: 12px;
  padding: 18px 36px;
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
  color: #fff; text-decoration: none;
  font-weight: 800; font-size: 17px;
  border-radius: 60px;
  box-shadow:
    0 0 0 4px rgba(37,211,102,0.15),
    0 14px 40px rgba(37,211,102,0.5);
  transition: transform 0.3s;
}
.web-card .cta-hero { animation: ns-fade-up 0.8s ease 1.55s forwards, ns-soft-bob 2.8s ease-in-out 3.5s infinite; }
.web-card .cta-wa-big { animation: ns-soft-bob 2.8s ease-in-out 3s infinite; }
.web-card .cta-hero:hover, .web-card .cta-wa-big:hover { transform: translateY(-3px); }
.web-card .cta-hero svg, .web-card .cta-wa-big svg { width: 24px; height: 24px; fill: #fff; }
.web-card .cta-wa-big {
  padding: 22px 42px; font-size: clamp(17px, 4.5vw, 21px); font-weight: 900;
}
.web-card .cta-wa-big svg { width: 30px; height: 30px; }

/* === SECTION HEADER === */
.web-card .sec-header { text-align: center; margin-bottom: 38px; }
.web-card .eyebrow {
  font-weight: 800; font-size: 11px; letter-spacing: 0.42em;
  color: var(--ns-cyan); text-transform: uppercase; margin-bottom: 10px;
  display: inline-flex; align-items: center; gap: 14px;
}
.web-card .eyebrow::before, .web-card .eyebrow::after {
  content: ''; width: 28px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent);
}
.web-card .sec-header h2 {
  font-weight: 900;
  font-size: clamp(30px, 8vw, 48px);
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  margin: 0;
}
.web-card .grad {
  background: var(--ns-grad); background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: ns-grad-shift 6s linear infinite;
}
@supports not (background-clip: text) {
  .web-card .grad { -webkit-text-fill-color: #d946ef; color: #d946ef; }
}

/* === NATALYA === */
.web-card .natalya-wrap {
  display: flex; justify-content: center;
}
.web-card .natalya-wrap .artista-card {
  width: clamp(240px, 72vw, 320px);
}

/* === ARTISTAS === */
.web-card .artistas-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.web-card .artista-card {
  position: relative;
  background: linear-gradient(180deg, rgba(20,12,38,0.95), rgba(10,6,20,0.98));
  border: 1px solid rgba(139,92,246,0.4);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}
.web-card .artista-img {
  position: relative;
  aspect-ratio: 3/4;
  overflow: hidden;
}
.web-card .artista-img img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 15%;
  display: block;
}
.web-card .art-fade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(10,6,20,0.8));
  pointer-events: none;
}
.web-card .artista-info {
  padding: 20px 14px 24px; text-align: center;
}
.web-card .art-nombre {
  font-family: 'Allison', cursive;
  font-size: clamp(40px, 10vw, 60px);
  line-height: 0.88; color: #fff; font-weight: 400;
  text-shadow: 0 0 18px rgba(0,212,255,0.4);
}
.web-card .art-apellido {
  font-family: 'Allison', cursive;
  font-size: clamp(28px, 7vw, 42px);
  line-height: 0.88; color: #fff; font-weight: 400;
  text-shadow: 0 0 16px rgba(217,70,239,0.4);
}
.web-card .art-role {
  margin-top: 6px;
  font-weight: 700; font-size: 10px; letter-spacing: 0.34em;
  color: var(--ns-dim); text-transform: uppercase;
}

/* === DETALLES === */
.web-card .info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 520px; margin: 0 auto;
}
.web-card .info-item {
  position: relative;
  background: linear-gradient(180deg, rgba(13,10,31,0.92), rgba(13,10,31,0.82));
  border: 1px solid rgba(139,92,246,0.35);
  border-radius: 16px;
  padding: 22px 16px;
  text-align: center;
  backdrop-filter: blur(12px);
}
.web-card .info-ico {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(217,70,239,0.15));
  border: 1px solid rgba(0,212,255,0.25);
  margin-bottom: 12px;
  color: var(--ns-cyan);
}
.web-card .info-ico svg { width: 22px; height: 22px; }
.web-card .info-label {
  font-weight: 800; font-size: 11px; letter-spacing: 0.34em;
  color: var(--ns-cyan); text-transform: uppercase;
  margin-bottom: 8px;

.web-card .info-valor {

<!-- CURVE SWIPE INTRO: cortina con borde curvo que barre hacia arriba al cargar -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
(function(){
  var c = document.getElementById('curtain');
  if (!c) return;
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var done = false;
  function hide(){ if (done) return; done = true; c.style.display = 'none'; }
  function sweep(){
    if (done) return;
    if (window.gsap && !reduce) {
      gsap.to(c, { yPercent: -118, duration: 1.1, ease: 'power3.inOut', onComplete: hide });
    } else { hide(); }
  }
  if (reduce) { hide(); return; }
  // La invitación es una app React: esperamos a que monte para revelar contenido real,
  // con un tiempo mínimo en pantalla para que el intro se lea.
  var start = Date.now();
  function mounted(){ var r = document.getElementById('root'); return r && r.children.length > 0; }
  (function wait(){
    var el = Date.now() - start;
    if (mounted() && el >= 700) { sweep(); }
    else if (el < 2000) { requestAnimationFrame(wait); }
    else { sweep(); }
  })();
  setTimeout(hide, 3500); // FAILSAFE OBLIGATORIO: la cortina SIEMPRE se quita
})();
</script>

<script>
/* Botón flotante WhatsApp: pop + wiggle periódico con GSAP (respeta reduced-motion) */
(function(){
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  function start(btn){
    gsap.set(btn, { transformOrigin: '50% 50%' });
    var tl = gsap.timeline({ repeat: -1, repeatDelay: 3 });
    tl.to(btn, { scale: 1.18, duration: 0.30, ease: 'back.out(3)' })
      .to(btn, { scale: 1, duration: 0.30, ease: 'power2.inOut' })
      .to(btn, { rotation: 14, duration: 0.09 })
      .to(btn, { rotation: -12, duration: 0.09 })
      .to(btn, { rotation: 9, duration: 0.09 })
      .to(btn, { rotation: -6, duration: 0.09 })
      .to(btn, { rotation: 0, duration: 0.12, ease: 'power1.out' });
  }
  var n = 0;
  var iv = setInterval(function(){
    var btn = document.querySelector('.wa-float');
    if ((btn && window.gsap) || n++ > 80) {
      clearInterval(iv);
      if (btn && window.gsap) start(btn);
    }
  }, 80);
})();
</script>
